<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boutique Hero</title>

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
    }

    .hero {
        position: relative;
        height: 100vh;
        overflow: hidden;
    }

    /* 🎥 Background Video */
    .hero video {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 100%;
        height: 100%;
        object-fit: cover;
        transform: translate(-50%, -50%);
        z-index: -1;
    }

    /* 🌑 Dark overlay for readability */
    .overlay {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.45);
        top: 0;
        left: 0;
        z-index: 1;
    }

    /* ✨ Text Content */
    .content {
        position: relative;
        z-index: 2;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: white;
        text-align: center;
    }

    .content h1 {
        font-size: 3rem;
        letter-spacing: 2px;
    }

    .content p {
        margin-top: 10px;
        font-size: 1.2rem;
        opacity: 0.8;
    }
</style>
</head>

<body>

<section class="hero">

    <!-- 🎥 Replace with your downloaded video -->
    <video autoplay muted loop id="bgVideo">
        <source src="bg" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <div class="content">
        <h1>Luxury Boutique</h1>
        <p>Style that defines you</p>
    </div>

</section>

<script>
    // 🐢 Slow down the video
    const video = document.getElementById("bgVideo");
    video.playbackRate = 0.6; // 1 = normal, 0.5 = slower
</script>

</body>
</html>
